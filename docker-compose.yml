services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PORT: 4000
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-mood-space-dev-pepper}
    ports:
      - "4000:4000"
    volumes:
      - mood_data:/app/server/data

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  mood_data: