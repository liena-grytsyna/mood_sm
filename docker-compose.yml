services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      PORT: 4000
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:-mood-space-dev-pepper}
    expose:
      - "4000"
    volumes:
      - mood_data:/app/server/data

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - "127.0.0.1:${WEB_PORT:-8081}:80"

volumes:
  mood_data:
